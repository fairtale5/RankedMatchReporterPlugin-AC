# RankedMatchReporterPlugin — example (copy to cfg/plugin_ranked_match_reporter_cfg.yml)

Enabled: true
LeagueId: gt3_ks
LeagueDisplayName: GT3 Ranked
SendRatingNoticeOnJoin: true
SendRatingNoticeAtSessionStart: true
RatingNoticeDelayAfterRaceSeconds: 3
RatingNoticeMaxWaitForRaceResultsSeconds: 15
RatingNoticePollIntervalSeconds: 1
ServerId: ff-circuit-gt3-ks

# serv-brain ingest (see serv-brain/README.md)
IngestUrl: http://127.0.0.1:10000/v1/races
ApiKey: ""

# true = log JSON only until ingest API exists
DryRun: true

MinimumDriversForRanked: 4
# Omit num_laps=0 starters from ingest so AFK drivers are not ranked (default false = legacy behavior).
ExcludeZeroLapDriversFromRanking: false
ReportUncountedRaces: true

PeakWindow:
  Enabled: true
  TimeZoneId: America/Sao_Paulo
  StartLocal: "17:30"
  EndLocal: "22:00"
